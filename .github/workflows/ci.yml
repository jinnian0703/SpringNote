name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flutter-checks:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spring_note

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Release script tests
        working-directory: ${{ github.workspace }}
        run: python3 -m unittest discover .github/scripts/tests

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: Rust test
        working-directory: spring_note/rust
        run: cargo test

  windows-build:
    name: Windows Release Build
    runs-on: windows-latest
    needs: flutter-checks
    defaults:
      run:
        working-directory: spring_note

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

  macos-build:
    name: macOS Release Build
    runs-on: macos-latest
    needs: flutter-checks
    defaults:
      run:
        working-directory: spring_note

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS DMG
        id: package-macos
        shell: bash
        run: |
          set -euo pipefail

          version="$(awk '/^version:/{print $2}' pubspec.yaml | cut -d+ -f1)"
          arch="$(uname -m)"
          if [ "$arch" = "x86_64" ]; then
            arch="x64"
          fi

          app_name="SpringNote"
          artifact_name="${app_name}-${version}-macos-${arch}"
          release_dir="build/macos/Build/Products/Release"
          stage_dir="${release_dir}/${artifact_name}"
          dmg_path="${release_dir}/${artifact_name}.dmg"

          rm -rf "$stage_dir" "$dmg_path"
          mkdir -p "$stage_dir"
          ditto "${release_dir}/spring_note.app" "${stage_dir}/${app_name}.app"
          ln -s /Applications "${stage_dir}/Applications"

          hdiutil create \
            -volname "$app_name" \
            -srcfolder "$stage_dir" \
            -ov \
            -format UDZO \
            "$dmg_path"

          hdiutil verify "$dmg_path"
          echo "dmg_path=${dmg_path}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package-macos.outputs.dmg_name }}
          path: spring_note/${{ steps.package-macos.outputs.dmg_path }}
          if-no-files-found: error
